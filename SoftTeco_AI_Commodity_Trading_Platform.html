<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Commodity Trading Platform — AI-Native Physical Commodity Trade · SoftTeco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08131c;
    --bg-alt:#0b1e2b;
    --panel:#0f2839;
    --panel-2:#123147;
    --line:#1c3f56;
    --edge:rgba(130,185,205,.14);
    --cyan:#34e5de;      /* our solution / intelligence */
    --cyan-soft:rgba(52,229,222,.13);
    --amber:#ff9d5c;     /* risk / friction / fraud */
    --amber-soft:rgba(255,157,92,.13);
    --red:#ff6f6f;
    --red-soft:rgba(255,111,111,.12);
    --blue:#5aa9e6;
    --text:#e7f2f6;
    --muted:#8aa9b8;
    --muted-2:#5f8395;
    --radius:14px;
    --maxw:1180px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:"IBM Plex Sans",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;
    overflow-x:hidden;
  }
  .mono{font-family:"IBM Plex Mono",monospace}
  .display{font-family:"Space Grotesk",sans-serif}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  a{color:inherit}

  /* ---------- header ---------- */
  header.site{
    position:sticky;top:0;z-index:40;
    backdrop-filter:blur(10px);
    background:linear-gradient(180deg,rgba(8,19,28,.92),rgba(8,19,28,.6));
    border-bottom:1px solid var(--edge);
  }
  .site .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
  .brand{display:flex;align-items:center;gap:10px;font-family:"Space Grotesk";font-weight:700;letter-spacing:.14em;font-size:14px}
  .brand .dot{width:9px;height:9px;border-radius:2px;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
  .htag{font-family:"IBM Plex Mono";font-size:11px;color:var(--muted-2);letter-spacing:.12em}
  @media(max-width:640px){.htag{display:none}}

  /* ---------- hero ---------- */
  .hero{position:relative;padding:76px 0 40px;overflow:hidden}
  .hero::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(700px 340px at 78% 8%,rgba(52,229,222,.10),transparent 60%),
      radial-gradient(620px 320px at 12% 34%,rgba(255,157,92,.08),transparent 60%);
    pointer-events:none;
  }
  .eyebrow{font-family:"IBM Plex Mono";font-size:12px;letter-spacing:.28em;color:var(--cyan);text-transform:uppercase}
  h1{
    font-family:"Space Grotesk";font-weight:700;
    font-size:clamp(30px,5.4vw,58px);line-height:1.02;letter-spacing:-.02em;
    margin:16px 0 0;max-width:18ch;
  }
  h1 .hl{color:var(--cyan)}
  .lede{color:var(--muted);font-size:clamp(15px,1.7vw,18px);max-width:62ch;margin:22px 0 0}

  .badges{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px}
  .badge{
    font-family:"IBM Plex Mono";font-size:11.5px;color:var(--text);
    border:1px solid var(--line);border-radius:999px;padding:8px 14px;
    background:rgba(18,49,71,.35);display:flex;align-items:center;gap:8px;
  }
  .badge .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
  .chip{
    font-family:"IBM Plex Mono";font-size:12px;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:7px 13px;background:rgba(18,49,71,.35);
  }
  .chip b{color:var(--text);font-weight:500}

  /* ---------- section frame ---------- */
  section.blk{padding:58px 0;border-top:1px solid var(--edge)}
  .kick{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
  .kick .num{font-family:"IBM Plex Mono";font-size:12px;color:var(--amber);letter-spacing:.1em}
  .kick .lab{font-family:"IBM Plex Mono";font-size:12px;color:var(--muted-2);letter-spacing:.22em;text-transform:uppercase}
  h2{font-family:"Space Grotesk";font-weight:600;font-size:clamp(22px,3vw,32px);letter-spacing:-.01em;margin:2px 0 0}
  h2 .hl{color:var(--cyan)}
  h2 .hl-am{color:var(--amber)}
  .sub{color:var(--muted);max-width:68ch;margin:12px 0 0;font-size:15px}

  /* ---------- stat cards (problem/market) ---------- */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:30px}
  @media(max-width:860px){.stats{grid-template-columns:1fr}}
  .stat{border-radius:14px;padding:22px 20px;border:1px solid var(--line);background:var(--panel)}
  .stat.fraud{background:linear-gradient(180deg,rgba(255,111,111,.08),var(--panel));border-color:rgba(255,111,111,.28)}
  .stat h3{font-family:"Space Grotesk";font-weight:700;font-size:28px;margin:0}
  .stat.fraud h3{color:var(--red)}
  .stat h4{font-family:"Space Grotesk";font-weight:600;font-size:14px;margin:10px 0 2px}
  .stat .stag{font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.1em;color:var(--muted-2);text-transform:uppercase}
  .stat p{color:var(--muted);font-size:13.5px;margin:10px 0 0;line-height:1.5}
  .stat .src{margin-top:14px;padding-top:10px;border-top:1px dashed rgba(255,111,111,.3);font-family:"IBM Plex Mono";font-size:10px;color:var(--red);letter-spacing:.08em}

  .headline-stat{
    margin-top:30px;background:linear-gradient(180deg,#0b1e2c,#091722);
    border:1px solid var(--line);border-radius:18px;padding:26px 28px;
    display:flex;align-items:center;gap:26px;flex-wrap:wrap;
  }
  .headline-stat .num{font-family:"Space Grotesk";font-weight:700;font-size:clamp(40px,6vw,64px);line-height:1}
  .headline-stat .num.gr{color:var(--red)}
  .headline-stat .txt{color:var(--muted);font-size:14px;max-width:44ch}

  /* ---------- module grid ---------- */
  .mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:30px}
  @media(max-width:960px){.mgrid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.mgrid{grid-template-columns:1fr}}
  .mod{
    position:relative;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:18px 16px;overflow:hidden;transition:.3s;
  }
  .mod::after{content:"";position:absolute;left:0;top:0;height:2px;width:0;background:var(--cyan);transition:.4s}
  .mod:hover{border-color:var(--cyan);transform:translateY(-3px)}
  .mod:hover::after{width:100%}
  .mod .ico{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;background:var(--cyan-soft);border:1px solid rgba(52,229,222,.28);margin-bottom:12px}
  .mod .ico svg{width:19px;height:19px;stroke:var(--cyan);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .mod .midx{font-family:"IBM Plex Mono";font-size:10.5px;color:var(--amber);letter-spacing:.08em}
  .mod h3{font-family:"Space Grotesk";font-weight:600;font-size:15px;margin:6px 0 4px}
  .mod p{color:var(--muted);font-size:12.5px;margin:0}

  /* ---------- product experience ---------- */
  .exp{display:grid;grid-template-columns:1.05fr 1fr;gap:34px;margin-top:32px;align-items:start}
  @media(max-width:900px){.exp{grid-template-columns:1fr}}
  .mockup{
    background:linear-gradient(180deg,#0e1f2c,#081420);
    border:1px solid var(--line);border-radius:16px;overflow:hidden;
    box-shadow:0 24px 60px -30px rgba(0,0,0,.8);
  }
  .mockup .mbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);background:rgba(18,49,71,.4)}
  .mockup .mbrand{display:flex;align-items:center;gap:8px;font-family:"Space Grotesk";font-weight:600;font-size:13px}
  .mockup .mbrand .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
  .mockup .micons{display:flex;gap:10px;color:var(--muted-2)}
  .mockup .mbody{display:flex}
  .mockup .mside{width:36%;border-right:1px solid var(--line);padding:14px 12px;display:flex;flex-direction:column;gap:6px}
  .mockup .mside .newtask{font-family:"IBM Plex Mono";font-size:10.5px;color:var(--text);background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 10px;margin-bottom:8px}
  .mockup .mside .navlab{font-family:"IBM Plex Mono";font-size:9px;color:var(--muted-2);letter-spacing:.12em;margin:8px 0 2px}
  .mockup .mside .navitem{font-family:"IBM Plex Sans";font-size:11.5px;color:var(--muted);padding:6px 8px;border-radius:6px}
  .mockup .mside .navitem.on{background:var(--cyan-soft);color:var(--text)}
  .mockup .mmain{flex:1;padding:20px 18px}
  .mockup .mq{display:flex;align-items:center;gap:8px;font-family:"Space Grotesk";font-weight:600;font-size:14px;margin-bottom:10px}
  .mockup .mq .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
  .mockup .mhint{color:var(--muted);font-size:11.5px;margin:0 0 16px;line-height:1.5}
  .mockup .minput{border:1px solid var(--line);border-radius:10px;padding:12px 12px;background:var(--panel);font-family:"IBM Plex Sans";font-size:12px;color:var(--text)}
  .mockup .mrow{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .mockup .mtoggle{display:flex;gap:8px}
  .mockup .mtogbtn{font-family:"IBM Plex Mono";font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:7px;padding:5px 9px}
  .mockup .mtogbtn.on{color:var(--cyan);border-color:var(--cyan)}
  .mockup .mmodel{font-family:"IBM Plex Mono";font-size:10px;color:var(--muted-2);border:1px solid var(--line);border-radius:7px;padding:5px 9px}

  .exp-feats{display:flex;flex-direction:column;gap:14px}
  .efeat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;transition:.25s}
  .efeat.hi{border-color:var(--cyan);background:linear-gradient(180deg,rgba(52,229,222,.06),var(--panel))}
  .efeat .en{font-family:"IBM Plex Mono";font-size:10.5px;color:var(--amber);letter-spacing:.1em}
  .efeat h4{font-family:"Space Grotesk";font-weight:600;font-size:15.5px;margin:6px 0 6px}
  .efeat p{color:var(--muted);font-size:13px;margin:0;line-height:1.5}

  /* ---------- moat / patents ---------- */
  .patentbar{display:flex;flex-wrap:wrap;gap:12px;margin-top:26px}
  .pchip{display:flex;flex-direction:column;gap:2px;border:1px solid var(--line);border-radius:11px;padding:9px 15px;background:rgba(18,49,71,.35)}
  .pchip .plab{font-family:"IBM Plex Mono";font-size:9.5px;color:var(--cyan);letter-spacing:.14em}
  .pchip .pval{font-family:"Space Grotesk";font-weight:600;font-size:12.5px}

  .phasegrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:28px}
  @media(max-width:900px){.phasegrid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.phasegrid{grid-template-columns:1fr}}
  .pcard{background:linear-gradient(180deg,var(--panel),#0c2333);border:1px solid var(--line);border-radius:14px;padding:20px}
  .pcard .pn{font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.14em;color:var(--amber)}
  .pcard h4{font-family:"Space Grotesk";font-weight:600;font-size:16px;margin:10px 0 8px}
  .pcard p{color:var(--muted);font-size:13px;margin:0}
  .pcard .ptag{display:block;margin-top:14px;font-family:"IBM Plex Mono";font-size:9.5px;color:var(--cyan);letter-spacing:.1em}

  /* ---------- comparison table ---------- */
  .cmp-wrap{margin-top:30px;overflow-x:auto;border:1px solid var(--line);border-radius:16px;background:var(--panel)}
  table.cmp{width:100%;border-collapse:collapse;min-width:720px}
  table.cmp th, table.cmp td{padding:16px 18px;text-align:center;border-bottom:1px solid var(--line)}
  table.cmp th{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.1em;color:var(--muted-2);text-transform:uppercase;font-weight:500}
  table.cmp td:first-child, table.cmp th:first-child{text-align:left;font-family:"Space Grotesk";font-weight:600;font-size:14px;color:var(--text)}
  table.cmp th.win{background:#050c12;color:var(--cyan);border-radius:10px 10px 0 0}
  table.cmp td.win{background:rgba(52,229,222,.06)}
  table.cmp tr:last-child td{border-bottom:none}
  .ring{width:12px;height:12px;border-radius:50%;border:2px solid var(--line);display:inline-block}
  .fill{width:12px;height:12px;border-radius:50%;background:var(--cyan);display:inline-block;box-shadow:0 0 10px rgba(52,229,222,.6)}
  .cmp-note{color:var(--muted);font-size:13.5px;margin-top:16px;max-width:80ch}
  .cmp-note b{color:var(--text);font-weight:600}

  footer{border-top:1px solid var(--edge);padding:30px 0 50px;color:var(--muted-2);font-family:"IBM Plex Mono";font-size:12px}
  footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}

  /* reveal */
  [data-reveal]{opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s ease}
  [data-reveal].in{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){[data-reveal]{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState,useEffect} = React;

/* ---------------- icons ---------------- */
function Icon({name}){
  const p = {
    kyc:<><circle cx="9" cy="9" r="4"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 8l2 2 4-4"/></>,
    forensics:<><rect x="5" y="4" width="14" height="17" rx="1.5"/><path d="M9 9h6M9 13h6M9 17h3"/><circle cx="17" cy="16" r="3.4" fill="none"/><path d="M19.4 18.4L22 21"/></>,
    room:<><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18"/><circle cx="8" cy="7" r="0.8" fill="var(--cyan)"/></>,
    chat:<><path d="M4 5h16v11H8l-4 4V5z"/><path d="M8 9h8M8 12h5"/></>,
    contract:<><path d="M6 3h9l4 4v14H6z"/><path d="M15 3v4h4"/><path d="M9 12h6M9 15h6M9 18h4"/></>,
    inspect:<><circle cx="10" cy="10" r="6"/><path d="M20 20l-5.2-5.2"/><path d="M10 7v6M7 10h6"/></>,
    pass:<><path d="M12 3l7 3v5c0 4.2-2.9 7.6-7 9-4.1-1.4-7-4.8-7-9V6l7-3z"/><path d="M9 12l2 2 4-4"/></>,
    logistics:<><rect x="2" y="9" width="12" height="8" rx="1"/><path d="M14 12h4l4 3v2h-8"/><circle cx="6" cy="19" r="1.6"/><circle cx="17.5" cy="19" r="1.6"/></>,
    release:<><path d="M4 12h11M11 7l5 5-5 5"/><path d="M18 6v12"/></>,
    audit:<><rect x="4" y="3" width="16" height="18" rx="1.5"/><path d="M8 8h8M8 12h8M8 16h5"/><circle cx="18" cy="17" r="0" /></>,
    market:<><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></>,
    api:<><rect x="3" y="3" width="7" height="7" rx="1.4"/><rect x="14" y="3" width="7" height="7" rx="1.4"/><rect x="3" y="14" width="7" height="7" rx="1.4"/><rect x="14" y="14" width="7" height="7" rx="1.4"/><path d="M10 6.5h4M6.5 10v4M17.5 10v4M10 17.5h4"/></>,
  }[name];
  return <svg viewBox="0 0 24 24">{p}</svg>;
}

/* ---------------- data ---------------- */
const MODULES = [
  {i:"kyc", n:"01", t:"KYC / KYB", d:"Identity verification across 195+ countries before anyone enters a deal room."},
  {i:"forensics", n:"02", t:"Document Forensics", d:"AI fraud and tamper detection on every certificate, invoice and bill of lading."},
  {i:"room", n:"03", t:"Private Deal Room", d:"A locked room for verified counterparties only, keyed to a single trade."},
  {i:"chat", n:"04", t:"Encrypted Chat", d:"End-to-end encrypted deal rooms for every negotiation thread."},
  {i:"contract", n:"05", t:"Smart Contracting", d:"AI-drafted CFC negotiation that turns terms into an executable contract."},
  {i:"inspect", n:"06", t:"Inspection Reports", d:"Accredited inspector flow feeding quality and quantity data straight into the deal."},
  {i:"pass", n:"07", t:"Commodity Pass", d:"Provenance and a cryptographic hash chain that travels with the cargo."},
  {i:"logistics", n:"08", t:"Logistics Tracking", d:"Live AIS positioning, ETA and route visibility from load port to discharge."},
  {i:"release", n:"09", t:"Conditional Release", d:"Verified settlement that only fires once every contract condition is met."},
  {i:"audit", n:"10", t:"Immutable Audit", d:"An append-only event ledger — every action recorded, nothing deleted."},
  {i:"market", n:"11", t:"Marketplace", d:"Verified supply discovery across metals, energy and agri commodities."},
  {i:"api", n:"12", t:"Platform API", d:"A native platform with APIs to integrate against or run standalone."},
];

const EXP_FEATURES = [
  {en:"01",t:"Domain-native intelligence",d:"Understands Incoterms, LME / LBMA pricing, assays, LCs and deal milestones out of the box.",hi:false},
  {en:"02",t:"Agent Mandate",d:"Toggle to Agent and it executes the day — drafting, screening, signing, scheduling — on the trader's approval.",hi:true},
  {en:"03",t:"You stay in control · non-custodial",d:"The AI prepares, the human consents, the platform records. The system never holds funds and never gives financial or legal advice.",hi:false},
  {en:"04",t:"Meets deals where they live",d:"Gmail and WhatsApp connectors organize existing deal flow — zero migration, zero friction.",hi:false},
];

const PATENTS = [
  {lab:"PROTOCOL",val:"CFC State Machine"},
  {lab:"ASSET",val:"Commodity Pass"},
  {lab:"INTELLIGENCE",val:"AI Orchestration"},
  {lab:"SETTLEMENT",val:"Conditional Routing"},
];

const PHASES = [
  {n:"01 — EXISTING WORKFLOWS",t:"Embeds where you work",d:"Agents reach into email, chat, ERP / TMS, and bank portals. No rip-and-replace.",tag:"NO MIGRATION"},
  {n:"02 — APPROVAL-GATED",t:"Human-in-the-loop",d:"Agents draft, negotiate, and verify. A named human approves every financial action.",tag:"NAMED APPROVER"},
  {n:"03 — AUDITABLE",t:"Tracked & replayable",d:"Every state transition is cryptographically recorded and can be replayed end-to-end.",tag:"FULL AUDIT TRAIL"},
  {n:"04 — ORCHESTRATION LAYER",t:"Model-agnostic",d:"Tool-using agents connected to live deal data. The orchestration is ours, any model.",tag:"OUR IP, ANY MODEL"},
];

const CMP_ROWS = [
  {name:"Intelligence & AI", vals:[0,0,0,1]},
  {name:"Document forensics", vals:[0,0,0,1]},
  {name:"Verified counterparties", vals:[0,0,0,1]},
  {name:"Contracts & negotiation", vals:[0,0,0,1]},
  {name:"Settlement & audit trail", vals:[0,0,0,1]},
  {name:"Distribution", vals:[0,0,0,1]},
];
const CMP_COLS = ["Broker chat","Trade-doc platforms","Marketplaces","Our solution"];

/* ---------------- app ---------------- */
function App(){
  const [act,setAct]=useState(1);

  useEffect(()=>{
    const id=setInterval(()=>setAct(a=>(a+1)%EXP_FEATURES.length),2600);
    return ()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    const els=document.querySelectorAll("[data-reveal]");
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.12});
    els.forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[]);

  return (
    <>
      <header className="site">
        <div className="wrap">
          <div className="brand"><span className="dot"></span>SOFTTECO</div>
          <div className="htag">AI-NATIVE COMMODITY TRADE PLATFORM</div>
        </div>
      </header>

      {/* hero */}
      <div className="hero">
        <div className="wrap">
          <div className="eyebrow">Built by SoftTeco</div>
          <h1 className="display">Your AI-Intelligence for <span className="hl">Physical Commodity Trade</span>.</h1>
          <p className="lede">SoftTeco engineered an AI Commodity Trading Platform — one connected deal room where AI agents run the entire trade, from sourcing verified supply to final settlement. Agents price it against live markets, draft and negotiate the contract, authenticate documents and counterparties, verify bank accounts, coordinate inspection, track cargo, and prove provenance. Every step is recorded on one tamper-proof ledger, and nothing settles until every condition is met.</p>

          <div className="badges">
            <div className="badge"><span className="dot"></span>NON-CUSTODIAL — NEVER TOUCHES FUNDS</div>
            <div className="badge"><span className="dot"></span>AI-NATIVE EXECUTION</div>
            <div className="badge"><span className="dot"></span>VERIFIED END-TO-END</div>
          </div>

          <div className="chips">
            <div className="chip"><b>12</b> modules</div>
            <div className="chip"><b>4</b> patents filed</div>
            <div className="chip">agents in <b>every</b> workflow</div>
            <div className="chip">deployed for a <b>$10T</b> industry</div>
          </div>
        </div>
      </div>

      {/* 01 problem & market */}
      <section className="blk" style={{background:"var(--bg-alt)"}}>

                  <div className="navitem on">Dashboard</div>

                  <div className="navlab">PRODUCTS</div>
                  <div className="navitem">Marketplace</div>
                  <div className="navitem">Settings</div>
                </div>
                <div className="mmain">
                  <div className="mq"><span className="dot"></span>What can I help you with?</div>

                  <div className="mrow">
                    <div className="mtoggle">
                      <span className="mtogbtn on">💬 Chat</span>
                      <span className="mtogbtn">⚙ Agent</span>
                    </div>
                    <span className="mmodel">Claude Opus 4.8 Max ▾</span>

              </div>

            <div className="exp-feats">

                  <p>{f.d}</p>
                </div>
              ))}
            </div>
          </div>

      {/* 04 moat & next phase */}

        <div className="wrap">

          <div className="patentbar" data-reveal>

          <div className="phasegrid">

              <div className="pcard" data-reveal key={p.t} style={{transitionDelay:(i*50)+"ms"}}>
